<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário</title>
 <link rel="stylesheet" href="form.css">
   
</head>
<body>
  <h1 class="titulo">Cadastro de Devs | Programador Web</h1>
<form action="#" method="post">
  <fieldset>
    <legend>Informações de Contato</legend>

    <label for="nome">Nome Completo:</label>
    <input type="text" id="nome" name="nome" maxlength="30" size="30" placeholder="Digite seu nome completo" oninput="this.value = this.value.replace(/[0-9]/g, '');" required>
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" size="35" maxlength="35" placeholder="seuemail@email.com" required>

    <label for="tel">Celular:</label>
    <input type="tel" id="tel" name="tel" placeholder="Ex:(00)99999-9999" size="18" maxlength="15">
    <br><br>

    <label for="endereco">Endereço:</label>
    <input type="text" id="endereco" name="endereco" placeholder="Digite seu endereço" size="30" maxlength="30">

    <label for="numero">Número:</label>
    <input type="text" id="numero" name="numero" size="5" maxlength="5"> 
    <br><br>

    <label for="complemento">Complemento:</label>
    <input type="text" id="complemento" name="complemento" size="50"> 
    <br><br>

    <label for="bairro">Bairro:</label>
    <input type="text" id="bairro" name="bairro" maxlength="20" size="14" placeholder="Bairro">

    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" name="cidade" maxlength="20" size="15" placeholder="Cidade"> 
    <br><br>

    <label for="estados">Estado:</label>
<select id="estados" name="estados" required>
    <option value="" selected disabled>Selecione seu estado</option>
    <option value="AC">Acre</option>
    <option value="AL">Alagoas</option>
    <option value="AP">Amapá</option>
    <option value="AM">Amazonas</option>
    <option value="BA">Bahia</option>
    <option value="CE">Ceará</option>
    <option value="DF">Distrito Federal</option>
    <option value="ES">Espírito Santo</option>
    <option value="GO">Goiás</option>
    <option value="MA">Maranhão</option>
    <option value="MT">Mato Grosso</option>
    <option value="MS">Mato Grosso do Sul</option>
    <option value="MG">Minas Gerais</option>
    <option value="PA">Pará</option>
    <option value="PB">Paraíba</option>
    <option value="PR">Paraná</option>
    <option value="PE">Pernambuco</option>
    <option value="PI">Piauí</option>
    <option value="RJ">Rio de Janeiro</option>
    <option value="RN">Rio Grande do Norte</option>
    <option value="RS">Rio Grande do Sul</option>
    <option value="RO">Rondônia</option>
    <option value="RR">Roraima</option>
    <option value="SC">Santa Catarina</option>
    <option value="SP">São Paulo</option>
    <option value="SE">Sergipe</option>
    <option value="TO">Tocantins</option>

    </select>
  
    <label for="cep">CEP:</label>
    <input type="text" id="cep" name="cep" placeholder="00000-000" maxlength="9" size="9" required oninput="this.value = this.value.replace(/[^0-9-]/g, '').replace(/^(\d{5})(\d)/, '$1-$2');">
  </fieldset>

  <br>

  <fieldset>
    <legend>Experiência Profissional</legend>
    <p>Você é um desenvolvedor:</p>
    
    <input type="radio" name="devweb" id="front" value="Front-End" checked>
    <label for="front">Front-End</label>
    
    <input type="radio" name="devweb" id="back" value="Back-End">
    <label for="back">Back-End</label>
    
    <input type="radio" name="devweb" id="full" value="Fullstack">
    <label for="full">Fullstack</label>
    
    <br><br>

    <label for="conhecimento">Qual o seu nível de conhecimento?</label>
    <select name="conhecimento" id="conhecimento" required>
      <option selected disabled value="">Selecione</option>
      <option value="junior">Júnior</option>
      <option value="pleno">Pleno</option>
      <option value="senior">Sênior</option>
      <option value="especialista">Especialista</option>
    </select>
    
    <br><br>
    
    <p>Selecione as tecnologias que utiliza:</p>
    <input type="checkbox" name="tecnologia" id="html" value="HTML">
    <label for="html">HTML</label>

    <input type="checkbox" name="tecnologia" id="css" value="CSS">
    <label for="css">CSS</label>

    <input type="checkbox" name="tecnologia" id="js" value="JavaScript">
    <label for="js">JavaScript</label>

    <input type="checkbox" name="tecnologia" id="py" value="Python">
    <label for="py">Python</label>
    <br><br>

    <label for="experiencia">Conte um pouco mais sobre sua experiência:</label>
    <br>
    <textarea rows="6" style="width: 100%; max-width: 500px;" id="experiencia" name="experiencia"></textarea>
  </fieldset>

  <br>
  <button type="reset">Limpar</button>
  <button type="submit">Enviar</button>
</form>
  
</body>
</html>
